<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="principal.css">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">

        <h1 class="title">Conversor de sistemas numéricos</h1>
        <form>
            <label class="calculator-input" for="decimal">Decimal</label>
            <br>
            <input class="calculator-input" type="number" id="decimal" name="decimal" required>
            <br>
            <label class="calculator-input" for="binary">Binary</label>
            <br>
            <input class="calculator-input" type="number" id="binary" name="binary" required>
            <br>
            <label class="calculator-input" for="octal">Octal</label>
            <br>
            <input class="calculator-input" type="number" id="octal" name="octal" required>
            <br>
            <label class="calculator-input" for="hexadecimal">Hexadecimal</label>
            <br>
            <input class="calculator-input" type="text" id="hexadecimal" name="hexadecimal" required>
            <br>
        </form>
    </div>
    <script src="app.js"></script>
</body>

</html>
